<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>密铺魔法屋</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
    font-family: "Segoe UI", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #2b3a4a;
  }
  #app { display: flex; height: 100vh; width: 100vw; }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 260px; min-width: 260px; height: 100%;
    background: linear-gradient(180deg, #ffffff 0%, #f3f7fb 100%);
    border-right: 1px solid #d8e1ea;
    display: flex; flex-direction: column;
    overflow-y: auto; padding: 16px 14px 24px; gap: 6px;
    box-shadow: 2px 0 12px rgba(40,70,110,0.06);
  }
  #sidebar h1 {
    font-size: 20px; margin: 2px 0 4px; line-height: 1.2;
    background: linear-gradient(90deg,#ff5d73,#ffa600,#33b3ff,#7c5cff);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 800; letter-spacing: .5px;
  }
  #sidebar .subtitle { font-size: 12px; color: #8497a8; margin-bottom: 8px; line-height: 1.4; }
  .section { margin-top: 10px; }
  .section-title {
    font-size: 12px; font-weight: 700; letter-spacing: .4px;
    color: #7587a0; margin: 8px 2px 6px; display: flex; align-items: center; gap: 6px;
  }
  .section-title .dot { width: 8px; height: 8px; border-radius: 50%; display:inline-block; }
  button.tool {
    width: 100%; text-align: left; border: 1px solid #d4deea; background: #fff;
    color: #344a5e; padding: 9px 12px; border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; margin-bottom: 6px; transition: all .12s ease; display:flex; align-items:center; gap:8px;
    user-select: none;
  }
  button.tool:hover { border-color: #9fc2e8; background: #f0f7ff; transform: translateY(-1px); }
  button.tool:active { transform: translateY(0); background: #e4f0ff; }
  button.tool .swatch { width:14px; height:14px; border-radius:4px; flex:0 0 auto; }
  button.tool .key { margin-left:auto; font-size:11px; color:#9aa9bb; font-weight:600; }
  button.tool.danger { color:#c0392b; border-color:#f1c9c2; }
  button.tool.danger:hover { background:#fff1ef; border-color:#e9a79d; }
  button.tool.accent { color:#1d6fd6; border-color:#bcd8f7; }
  button.tool.accent:hover { background:#eaf4ff; }

  .toggle-row {
    display:flex; align-items:center; justify-content:space-between;
    background:#fff; border:1px solid #d4deea; border-radius:10px; padding:9px 12px; margin-bottom:6px;
  }
  .toggle-row .switch-label { font-size:13px; font-weight:600; }
  .switch { position:relative; display:inline-block; width:42px; height:24px; flex:0 0 auto; cursor:pointer; }
  .switch input { opacity:0; width:0; height:0; position:absolute; }
  .slider {
    position:absolute; inset:0; background:#cdd8e4; border-radius:24px; transition:.2s;
  }
  .slider:before {
    content:""; position:absolute; height:18px; width:18px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  .switch input:checked + .slider { background:#3aa0ff; }
  .switch input:checked + .slider:before { transform:translateX(18px); }

  /* ---------- Custom shape builder ---------- */
  .field-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .field-row > label { font-size:13px; font-weight:600; color:#344a5e; flex:0 0 auto; }
  .field-row input[type=number] {
    width:62px; padding:7px 9px; border:1px solid #d4deea; border-radius:8px;
    font-size:13px; font-weight:600; color:#344a5e; text-align:center;
  }
  .field-row input[type=range] { flex:1; accent-color:#e6477e; cursor:pointer; }
  .field-row .deg { font-size:13px; color:#7587a0; font-weight:600; }
  .stepper { display:flex; align-items:center; gap:6px; margin-left:auto; }
  .stepper button {
    width:30px; height:30px; border:1px solid #d4deea; background:#fff; border-radius:8px;
    font-size:17px; font-weight:700; color:#344a5e; cursor:pointer; line-height:1; padding:0;
  }
  .stepper button:hover { background:#f0f7ff; border-color:#9fc2e8; }
  .stepper input { width:44px; height:30px; text-align:center; border:1px solid #d4deea;
    border-radius:8px; font-size:14px; font-weight:700; color:#344a5e; }
  .field-hint { font-size:12px; color:#7587a0; margin:0 2px 8px; font-weight:600; }
  .field-sub { font-size:12px; color:#7587a0; font-weight:600; margin:2px 2px 6px; }
  #angleInputs .field-row { margin-bottom:6px; }
  #angleInputs label { width:auto; }
  #angleInputs input.auto { background:#eef2f6; color:#7587a0; cursor:not-allowed; }

  /* ---------- Canvas area ---------- */
  #stage { flex:1; position:relative; display:flex; flex-direction:column; min-width:0; }
  #banner {
    height:44px; min-height:44px; display:flex; align-items:center; gap:10px; padding:0 16px;
    background:linear-gradient(90deg,#2b6fb0,#3a8fd0); color:#fff; font-size:13px; font-weight:600;
    box-shadow:0 2px 8px rgba(30,80,140,.25); z-index:5; overflow:hidden; white-space:nowrap;
  }
  #banner .pill { background:rgba(255,255,255,.18); padding:3px 9px; border-radius:20px; font-weight:600; }
  #canvas-wrap {
    flex:1; position:relative; overflow:hidden;
    background-color:#eef2f5;
    background-image:
      linear-gradient(rgba(150,170,190,.30) 1px, transparent 1px),
      linear-gradient(90deg, rgba(150,170,190,.30) 1px, transparent 1px),
      linear-gradient(rgba(150,170,190,.14) 1px, transparent 1px),
      linear-gradient(90deg, rgba(150,170,190,.14) 1px, transparent 1px);
    background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
  }
  canvas { display:block; }
  #counter {
    position:absolute; right:12px; bottom:10px; z-index:6;
    background:rgba(255,255,255,.85); border:1px solid #cdd8e4; border-radius:20px;
    padding:4px 12px; font-size:12px; font-weight:700; color:#42566a; pointer-events:none;
  }

  /* ---------- Canvas view controls (pan / zoom / overview) ---------- */
  #viewControls {
    position:absolute; left:12px; bottom:10px; z-index:6;
    display:flex; align-items:center; gap:4px;
    background:rgba(255,255,255,.92); border:1px solid #cdd8e4; border-radius:22px;
    padding:4px; box-shadow:0 2px 8px rgba(40,70,110,.12);
  }
  #viewControls button {
    border:none; background:transparent; color:#42566a; cursor:pointer;
    width:30px; height:30px; border-radius:50%; font-size:16px; font-weight:700;
    display:flex; align-items:center; justify-content:center; line-height:1; padding:0;
    transition:background .12s ease;
  }
  #viewControls button:hover { background:#eaf4ff; }
  #viewControls button:active { background:#d8ecff; }
  #viewControls #vcZoomLabel { width:auto; min-width:48px; border-radius:14px; font-size:12px; font-weight:700; }
  #viewControls #vcPan.active { background:#3aa0ff; color:#fff; }

  @media (max-width: 760px) {
    #sidebar { width: 214px; min-width:214px; }
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <h1>密铺魔法屋</h1>
    <div class="subtitle">探索图形如何拼接 —— 让相同颜色的边对齐！</div>

    <div class="section">
      <div class="section-title"><span class="dot" style="background:#3aa0ff"></span>显示</div>
      <div class="toggle-row">
        <span class="switch-label">显示内角度数</span>
        <label class="switch">
          <input type="checkbox" id="toggleAngles" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="section" id="secFile">
      <div class="section-title"><span class="dot" style="background:#00b3a4"></span>文件</div>
      <button class="tool accent" id="btnExport">&#128190; 导出图形</button>
      <button class="tool accent" id="btnImport">&#128193; 导入图形</button>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none" />
    </div>

    <div class="section" id="secRegular">
      <div class="section-title"><span class="dot" style="background:#34c759"></span>正多边形</div>
      <button class="tool" data-add="triangle"><span class="swatch" style="background:#cdeccf"></span>正三角形</button>
      <button class="tool" data-add="square"><span class="swatch" style="background:#cfe3f7"></span>正方形</button>
      <button class="tool" data-add="hexagon"><span class="swatch" style="background:#f7e6c9"></span>正六边形</button>
      <button class="tool" data-add="pentagon"><span class="swatch" style="background:#f3d2e0"></span>正五边形&nbsp;&#10060;</button>
    </div>

    <div class="section" id="secRandom">
      <div class="section-title"><span class="dot" style="background:#ff9500"></span>随机不规则图形</div>
      <button class="tool" data-add="randTriangle"><span class="swatch" style="background:#e6dcf7"></span>随机三角形</button>
      <button class="tool" data-add="randQuad"><span class="swatch" style="background:#dcf0f7"></span>随机四边形</button>
    </div>

    <div class="section" id="secCustom">
      <div class="section-title"><span class="dot" style="background:#e6477e"></span>自定义图形</div>
      <div class="field-row">
        <label>边数</label>
        <div class="stepper">
          <button type="button" id="sidesDown">&minus;</button>
          <input type="text" id="customSides" value="4" readonly />
          <button type="button" id="sidesUp">+</button>
        </div>
      </div>
      <div class="field-row">
        <label>大小</label>
        <input type="range" id="customSize" min="40" max="120" value="78" />
      </div>
      <div class="toggle-row">
        <span class="switch-label">正多边形</span>
        <label class="switch">
          <input type="checkbox" id="customRegular" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div id="angleBox" style="display:none">
        <div class="field-sub">每个角的度数（内角）</div>
        <div id="angleInputs"></div>
        <div class="field-hint" id="angleSumHint"></div>
      </div>
      <button class="tool accent" id="btnCreateCustom">&#10010; 创建图形</button>
    </div>

    <div class="section" id="secActions" style="display:none">
      <div class="section-title"><span class="dot" style="background:#7c5cff"></span>操作</div>
      <button class="tool accent" id="btnDuplicate">&#128203; 复制<span class="key">Ctrl+D</span></button>
      <button class="tool accent" id="btnUndo">&#8630; 撤销<span class="key">Ctrl+Z</span></button>
      <button class="tool accent" id="btnGroup">&#128230; 组合 / 解组<span class="key">Ctrl+G</span></button>
      <button class="tool accent" id="btnTessDemo">&#10024; 一键密铺演示（选中图形）</button>
      <button class="tool danger" id="btnDelete">&#128465; 删除选中<span class="key">Del</span></button>
      <button class="tool danger" id="btnClear">&#128260; 清空画布</button>
    </div>
  </aside>

  <main id="stage">
    <div id="banner">
      <span class="pill">提示</span>
      <span id="bannerText">添加图形后，拖动一个靠近另一个 —— 出现黄色虚线表示即将吸附，松开即锁定（绿色闪光）。让相同颜色的边对齐！</span>
    </div>
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="counter">图形：0</div>
      <div id="viewControls">
        <button id="vcPan" type="button" title="移动画布（H，或按住空格 / 中键拖动）">&#9995;</button>
        <button id="vcZoomOut" type="button" title="缩小（&minus;）">&minus;</button>
        <button id="vcZoomLabel" type="button" title="重置为 100%">100%</button>
        <button id="vcZoomIn" type="button" title="放大（+）">+</button>
        <button id="vcFit" type="button" title="概览 · 适应窗口（0）">&#9974;</button>
      </div>
    </div>
  </main>
</div>

<script>
"use strict";
/* =========================================================================
   密铺魔法屋 / Tessellation Magic House
   Single-file educational geometry tessellation tool built on Fabric.js.
   ========================================================================= */

// ---- Bright edge color palette (Edge1 Red, Edge2 Green, Edge3 Blue, ...) ----
var EDGE_COLORS = ["#e63946", "#2a9d3f", "#1d6fd6", "#ff8c00", "#7c4dff", "#00b3a4", "#e91e8c"];
// ---- Soft pastel fills (cycled per new shape) ----
var FILL_COLORS = ["#cdeccf", "#cfe3f7", "#f7e6c9", "#f3d2e0", "#e6dcf7", "#dcf0f7", "#fde2cf"];
var fillIdx = 0;
function nextFill() { var c = FILL_COLORS[fillIdx % FILL_COLORS.length]; fillIdx++; return c; }

var DEG = fabric.util.radiansToDegrees;
var RAD = fabric.util.degreesToRadians;
var SNAP_DIST = 30;          // px vertex proximity to trigger snap
var SNAP_ANGLE = RAD(25);    // max rotation allowed to align edges
var transformPoint = fabric.util.transformPoint;
// custom properties that must survive serialization (undo / duplicate)
var EXTRA_PROPS = ["edgeColors", "showAngles", "edgeStrokeWidth"];

// Globally disable resizing/scaling for every object type (polygons, groups,
// and multi-selections) so duplicates keep identical size — a prerequisite for
// tessellation. Moving + rotating remain available; only scale is removed.
fabric.Object.prototype.lockScalingX = true;
fabric.Object.prototype.lockScalingY = true;
fabric.Object.prototype.lockScalingFlip = true;
["tl", "tr", "bl", "br", "ml", "mr", "mt", "mb"].forEach(function (k) {
  if (fabric.Object.prototype.controls[k]) fabric.Object.prototype.controls[k].visible = false;
});

function normAngle(a){ while(a > Math.PI) a -= 2*Math.PI; while(a < -Math.PI) a += 2*Math.PI; return a; }
function dist(p, q){ var dx = p.x-q.x, dy = p.y-q.y; return Math.sqrt(dx*dx + dy*dy); }

/* -------------------------------------------------------------------------
   Custom Fabric object: ColoredPolygon
   A single Fabric object that renders a pastel fill plus per-edge colored
   ultra-thin lines, and (optionally) interior angle labels. Keeping it as a
   single object gives us a clean transformation matrix for the snap engine.
   ------------------------------------------------------------------------- */
fabric.ColoredPolygon = fabric.util.createClass(fabric.Polygon, {
  type: "coloredPolygon",
  edgeColors: null,
  showAngles: false,
  edgeStrokeWidth: 1.5,
  // render straight to the canvas (no cached bitmap) so edges + angle labels stay crisp
  objectCaching: false,

  initialize: function (points, options) {
    options = options || {};
    this.callSuper("initialize", points, options);
    this.edgeColors = options.edgeColors || EDGE_COLORS;
    this.showAngles = !!options.showAngles;
    if (options.edgeStrokeWidth) this.edgeStrokeWidth = options.edgeStrokeWidth;
    this.set({
      objectCaching: false,
      fill: options.fill || "#cfe3f7",
      stroke: null,
      strokeWidth: 0,
      perPixelTargetFind: true,
      cornerColor: "#1d6fd6",
      cornerStyle: "circle",
      transparentCorners: false,
      borderColor: "#1d6fd6",
      cornerSize: 10,
      padding: 4
    });
  },

  toObject: function (propsToInclude) {
    return fabric.util.object.extend(this.callSuper("toObject", propsToInclude), {
      edgeColors: this.edgeColors.slice(),
      showAngles: this.showAngles,
      edgeStrokeWidth: this.edgeStrokeWidth
    });
  },

  _render: function (ctx) {
    var pts = this.points, n = pts.length;
    var ox = this.pathOffset.x, oy = this.pathOffset.y;

    // centroid (for inward angle-label placement)
    var cx = 0, cy = 0;
    for (var k = 0; k < n; k++) { cx += pts[k].x; cy += pts[k].y; }
    cx /= n; cy /= n;

    // 1) pastel fill
    ctx.beginPath();
    for (var i = 0; i < n; i++) {
      var p = pts[i];
      if (i === 0) ctx.moveTo(p.x - ox, p.y - oy);
      else ctx.lineTo(p.x - ox, p.y - oy);
    }
    ctx.closePath();
    ctx.fillStyle = this.fill;
    ctx.fill();

    // 2) ultra-thin colored edges
    ctx.lineCap = "round";
    for (var e = 0; e < n; e++) {
      var a = pts[e], b = pts[(e + 1) % n];
      ctx.beginPath();
      ctx.moveTo(a.x - ox, a.y - oy);
      ctx.lineTo(b.x - ox, b.y - oy);
      ctx.strokeStyle = this.edgeColors[e % this.edgeColors.length];
      ctx.lineWidth = this.edgeStrokeWidth;
      ctx.stroke();
    }

    // 3) interior angle labels
    if (this.showAngles) {
      ctx.font = "bold 13px 'Segoe UI', Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (var v = 0; v < n; v++) {
        var cur = pts[v];
        var prev = pts[(v - 1 + n) % n];
        var nxt = pts[(v + 1) % n];
        var a1 = Math.atan2(prev.y - cur.y, prev.x - cur.x);
        var a2 = Math.atan2(nxt.y - cur.y, nxt.x - cur.x);
        var ang = Math.abs(a1 - a2) * 180 / Math.PI;
        if (ang > 180) ang = 360 - ang;
        var deg = Math.round(ang);
        // offset toward centroid
        var dx = cx - cur.x, dy = cy - cur.y;
        var len = Math.sqrt(dx*dx + dy*dy) || 1;
        var off = Math.min(26, len * 0.4);
        var tx = cur.x + (dx/len)*off - ox;
        var ty = cur.y + (dy/len)*off - oy;
        var label = deg + "\u00B0";
        tx = Math.round(tx); ty = Math.round(ty);
        // thin white halo (glyph outline, not a background box) keeps dark text legible
        ctx.lineJoin = "round";
        ctx.miterLimit = 2;
        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.strokeText(label, tx, ty);
        ctx.fillStyle = "#16334a";
        ctx.fillText(label, tx, ty);
      }
    }
  }
});
fabric.ColoredPolygon.fromObject = function (object, callback) {
  return fabric.Object._fromObject("ColoredPolygon", object, callback, "points");
};

/* ------------------------------- Canvas setup ------------------------------ */
var wrap = document.getElementById("canvas-wrap");
var canvas = new fabric.Canvas("c", {
  backgroundColor: "transparent",
  selection: true,
  preserveObjectStacking: true,
  uniformScaling: true,
  // Hit-test the rendered shape (its fill), not the bounding rectangle, so a
  // click in an empty bounding-box corner does not grab the shape.
  perPixelTargetFind: true,
  targetFindTolerance: 4,
  selectionColor: "rgba(58,160,255,0.12)",
  selectionBorderColor: "#1d6fd6",
  selectionLineWidth: 1.5
});

function resizeCanvas() {
  canvas.setWidth(wrap.clientWidth);
  canvas.setHeight(wrap.clientHeight);
  canvas.calcOffset();
  syncGrid();
  canvas.requestRenderAll();
}
window.addEventListener("resize", resizeCanvas);

/* ----------------- Canvas view: move (pan) / scale (zoom) / overview ------
   The viewport (Fabric's viewportTransform) is what we move & scale, so the
   shapes themselves keep their true geometry — essential for tessellation.
   - Move:     hand-tool button, hold Space, or middle-mouse drag.
   - Scale:    +/- buttons, mouse wheel (zoom toward the cursor), or +/- keys.
   - Overview: fit every shape into the visible area (or reset when empty).
   --------------------------------------------------------------------------- */
var MIN_ZOOM = 0.2, MAX_ZOOM = 6;
var handMode = false;     // persistent hand tool (toggled via button / H)
var spaceDown = false;    // transient hand while Space is held
var isPanning = false;
var lastPanPoint = null;

// Keep the CSS background grid aligned with the panned / zoomed viewport.
function syncGrid() {
  var vpt = canvas.viewportTransform;
  if (!vpt) return;
  var z = vpt[0], ox = vpt[4], oy = vpt[5];
  var big = 100 * z, small = 20 * z;
  wrap.style.backgroundSize =
    big + "px " + big + "px, " + big + "px " + big + "px, " +
    small + "px " + small + "px, " + small + "px " + small + "px";
  wrap.style.backgroundPosition =
    ox + "px " + oy + "px, " + ox + "px " + oy + "px, " +
    ox + "px " + oy + "px, " + ox + "px " + oy + "px";
}

function updateZoomLabel() {
  var el = document.getElementById("vcZoomLabel");
  if (el) el.textContent = Math.round(canvas.getZoom() * 100) + "%";
}

function afterViewChange() {
  syncGrid();
  updateZoomLabel();
  canvas.requestRenderAll();
}

function panActive() { return handMode || spaceDown; }

// Reflect the current pan-tool state on the canvas (cursor, hit-testing, etc.).
function refreshPanState() {
  var on = panActive();
  canvas.selection = !on;        // suppress rubber-band selection while panning
  canvas.skipTargetFind = on;    // clicks pan instead of grabbing shapes
  canvas.defaultCursor = on ? "grab" : "default";
  canvas.hoverCursor = on ? "grab" : "move";
  var btn = document.getElementById("vcPan");
  if (btn) btn.classList.toggle("active", handMode);
  if (on) canvas.discardActiveObject();
  if (!isPanning) canvas.setCursor(on ? "grab" : "default");
  canvas.requestRenderAll();
}

function setPanMode(on) {
  handMode = on;
  refreshPanState();
  flashBanner(on ? "移动画布模式：拖动空白处即可平移视图（再次点击 ✋ 或按 H 退出）。"
                 : "已退出移动画布模式。");
}

/* ------------------------------- Scale (zoom) ------------------------------ */
function setZoomAtPoint(newZoom, point) {
  newZoom = clamp(newZoom, MIN_ZOOM, MAX_ZOOM);
  if (point) canvas.zoomToPoint(point, newZoom);
  else canvas.setZoom(newZoom);
  afterViewChange();
}

function zoomBy(factor) {
  var center = new fabric.Point(canvas.getWidth() / 2, canvas.getHeight() / 2);
  setZoomAtPoint(canvas.getZoom() * factor, center);
}

function resetView() {
  canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
  afterViewChange();
}

// Wheel = zoom toward the pointer.
canvas.on("mouse:wheel", function (opt) {
  var e = opt.e;
  e.preventDefault();
  e.stopPropagation();
  var zoom = canvas.getZoom() * Math.pow(0.999, e.deltaY);
  setZoomAtPoint(zoom, new fabric.Point(e.offsetX, e.offsetY));
});

/* -------------------------- Overview (fit to view) ------------------------- */
function fitToView() {
  var objs = canvas.getObjects().filter(function (o) { return !o.isGuide; });
  if (!objs.length) { resetView(); return; }

  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  objs.forEach(function (o) {
    var r = o.getBoundingRect(true, true); // scene coords, ignoring viewport
    minX = Math.min(minX, r.left);
    minY = Math.min(minY, r.top);
    maxX = Math.max(maxX, r.left + r.width);
    maxY = Math.max(maxY, r.top + r.height);
  });

  var pad = 60;
  var vw = canvas.getWidth(), vh = canvas.getHeight();
  var bw = Math.max(maxX - minX, 1), bh = Math.max(maxY - minY, 1);
  var zoom = clamp(Math.min((vw - 2 * pad) / bw, (vh - 2 * pad) / bh), MIN_ZOOM, MAX_ZOOM);
  var cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
  canvas.setViewportTransform([zoom, 0, 0, zoom, vw / 2 - cx * zoom, vh / 2 - cy * zoom]);
  afterViewChange();
}

/* ------------------------------- Move (pan) -------------------------------- */
canvas.on("mouse:down", function (opt) {
  var e = opt.e;
  if (!e) return;
  // Pan with the hand tool, Space held, or the middle mouse button.
  if (panActive() || e.button === 1) {
    isPanning = true;
    canvas.selection = false;
    canvas.discardActiveObject();
    lastPanPoint = { x: e.clientX, y: e.clientY };
    canvas.setCursor("grabbing");
    canvas.requestRenderAll();
  }
});
canvas.on("mouse:move", function (opt) {
  if (!isPanning) return;
  var e = opt.e;
  var vpt = canvas.viewportTransform;
  vpt[4] += e.clientX - lastPanPoint.x;
  vpt[5] += e.clientY - lastPanPoint.y;
  lastPanPoint = { x: e.clientX, y: e.clientY };
  canvas.requestRenderAll();
  syncGrid();
});
canvas.on("mouse:up", function () {
  if (!isPanning) return;
  isPanning = false;
  canvas.setViewportTransform(canvas.viewportTransform); // settle coords
  canvas.selection = !panActive();
  canvas.setCursor(panActive() ? "grab" : "default");
});

resizeCanvas();

function updateCounter() {
  var n = canvas.getObjects().filter(function(o){return !o.isGuide;}).length;
  document.getElementById("counter").textContent = "图形：" + n;
  updateUI(n);
}

// Empty canvas → show the shape-creation tools (and hide the actions). Once a
// shape exists → hide creation (no second, different base shape) and show the
// actions instead. Clearing the canvas returns to the creation state.
function updateUI(n) {
  var creating = n === 0;
  ["secRegular", "secRandom", "secCustom"].forEach(function (id) {
    document.getElementById(id).style.display = creating ? "" : "none";
  });
  document.getElementById("secActions").style.display = creating ? "none" : "";
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/* ----------------------------- Shape factories ----------------------------- */
function regularPolygonPoints(sides, radius, rotationDeg) {
  var pts = [];
  var start = RAD(rotationDeg || 0);
  for (var i = 0; i < sides; i++) {
    var a = start + (i * 2 * Math.PI / sides);
    pts.push({ x: radius * Math.cos(a), y: radius * Math.sin(a) });
  }
  return pts;
}

function centerOfView() {
  var z = canvas.getZoom();
  return {
    x: (canvas.getWidth()/2 - canvas.viewportTransform[4]) / z,
    y: (canvas.getHeight()/2 - canvas.viewportTransform[5]) / z
  };
}

function addPolygon(points, opts) {
  opts = opts || {};
  var c = centerOfView();
  // small random scatter so stacked adds remain visible
  var jx = (Math.random()-0.5) * 80;
  var jy = (Math.random()-0.5) * 80;
  var poly = new fabric.ColoredPolygon(points, {
    left: c.x + jx,
    top: c.y + jy,
    originX: "center",
    originY: "center",
    fill: opts.fill || nextFill(),
    showAngles: anglesOn,
    angle: opts.angle || 0
  });
  canvas.add(poly);
  canvas.setActiveObject(poly);
  canvas.requestRenderAll();
  updateCounter();
  return poly;
}

function isConvex(pts) {
  var n = pts.length, sign = 0;
  for (var i = 0; i < n; i++) {
    var a = pts[i], b = pts[(i+1)%n], c = pts[(i+2)%n];
    var cross = (b.x-a.x)*(c.y-b.y) - (b.y-a.y)*(c.x-b.x);
    if (cross !== 0) {
      var s = cross > 0 ? 1 : -1;
      if (sign === 0) sign = s;
      else if (s !== sign) return false;
    }
  }
  return true;
}

function randomConvex(nSides) {
  // generate n points at sorted angles with varied radii -> simple polygon,
  // retry until convex and reasonably non-degenerate.
  for (var attempt = 0; attempt < 60; attempt++) {
    var angles = [];
    for (var i = 0; i < nSides; i++) {
      var base = i * (2*Math.PI/nSides);
      angles.push(base + (Math.random()-0.5) * (2*Math.PI/nSides) * 0.85);
    }
    angles.sort(function(a,b){return a-b;});
    var pts = [];
    for (var j = 0; j < nSides; j++) {
      var r = 55 + Math.random()*55; // 55..110
      pts.push({ x: r*Math.cos(angles[j]), y: r*Math.sin(angles[j]) });
    }
    if (!isConvex(pts)) continue;
    var ok = true;
    for (var e = 0; e < nSides; e++) {
      if (dist(pts[e], pts[(e+1)%nSides]) < 35) { ok = false; break; }
    }
    if (ok) return pts;
  }
  return regularPolygonPoints(nSides, 80, Math.random()*90);
}

function addShape(kind) {
  pushUndo();
  switch (kind) {
    case "triangle": return addPolygon(regularPolygonPoints(3, 78, -90));
    case "square":   return addPolygon(regularPolygonPoints(4, 70, -45));
    case "hexagon":  return addPolygon(regularPolygonPoints(6, 72, -90));
    case "pentagon": return addPolygon(regularPolygonPoints(5, 72, -90));
    case "randTriangle": return addPolygon(randomConvex(3));
    case "randQuad":     return addPolygon(randomConvex(4));
  }
}

/* --------------------------- Custom shape builder -------------------------- */
function customSidesValue() { return clamp(parseInt(document.getElementById("customSides").value, 10) || 4, 3, 12); }
function angleSum(n) { return (n - 2) * 180; }

// When "regular" is off, show one interior-angle input per side. Rebuilt
// whenever the side count changes; defaults to the regular angle for that N.
function refreshCustomFields() {
  var regular = document.getElementById("customRegular").checked;
  document.getElementById("angleBox").style.display = regular ? "none" : "";
  if (!regular) buildAngleInputs();
}

function buildAngleInputs() {
  var n = customSidesValue();
  var base = Math.round(angleSum(n) / n);
  var box = document.getElementById("angleInputs");
  var html = "";
  for (var k = 0; k < n; k++) {
    var last = k === n - 1;
    html += '<div class="field-row"><label>角 ' + (k + 1) + (last ? "（自动）" : "") + '</label>' +
            '<input type="number" class="angIn' + (last ? " auto" : "") + '" min="1" max="179" value="' + base + '"' +
            (last ? ' readonly' : '') + ' /><span class="deg">°</span></div>';
  }
  box.innerHTML = html;
  // only the first N−1 angles are editable; the last is derived so the sum closes
  var editable = box.querySelectorAll(".angIn:not(.auto)");
  for (var i = 0; i < editable.length; i++) editable[i].addEventListener("input", recomputeLastAngle);
  recomputeLastAngle();
}

function recomputeLastAngle() {
  var n = customSidesValue();
  var target = angleSum(n);
  var inputs = document.querySelectorAll("#angleInputs .angIn");
  var sumOthers = 0;
  for (var i = 0; i < inputs.length - 1; i++) sumOthers += parseFloat(inputs[i].value) || 0;
  var lastEl = inputs[inputs.length - 1];
  var lastVal = target - sumOthers;
  if (lastEl) lastEl.value = Math.round(lastVal * 10) / 10;
  var el = document.getElementById("angleSumHint");
  if (lastVal > 0.5 && lastVal < 179.5) {
    el.textContent = "角 " + n + " 自动为 " + (Math.round(lastVal * 10) / 10) + "°（内角和 " + target + "°）";
    el.style.color = "#2a9d3f";
  } else {
    el.textContent = "前面的角太大了：角 " + n + " 需在 0°~180° 之间（当前 " + (Math.round(lastVal * 10) / 10) + "°）";
    el.style.color = "#c0392b";
  }
}

function currentAngles() {
  var inputs = document.querySelectorAll("#angleInputs .angIn");
  var out = [];
  for (var i = 0; i < inputs.length; i++) out.push(parseFloat(inputs[i].value) || 0);
  return out;
}

// Build a polygon from its interior angles. The edge directions follow from the
// exterior turns (180−angle); we fix the first N−2 side lengths and solve the
// last two so the boundary closes (Σ sᵢ·dᵢ = 0). Returns null if the angles
// can't form a simple polygon.
function polygonFromAngles(anglesDeg, baseLen) {
  var n = anglesDeg.length;
  var phi = [0], k;
  for (k = 1; k < n; k++) phi[k] = phi[k - 1] + (180 - anglesDeg[k]);
  var d = phi.map(function (p) { var r = RAD(p); return { x: Math.cos(r), y: Math.sin(r) }; });
  var s = new Array(n), Rx = 0, Ry = 0;
  for (k = 0; k < n - 2; k++) { s[k] = baseLen; Rx -= baseLen * d[k].x; Ry -= baseLen * d[k].y; }
  var d1 = d[n - 2], d2 = d[n - 1];
  var det = d1.x * d2.y - d1.y * d2.x;
  if (Math.abs(det) < 1e-9) return null;
  var sA = (Rx * d2.y - Ry * d2.x) / det;
  var sB = (d1.x * Ry - d1.y * Rx) / det;
  if (sA <= 1e-6 || sB <= 1e-6) return null;
  s[n - 2] = sA; s[n - 1] = sB;
  var pts = [{ x: 0, y: 0 }];
  for (k = 0; k < n - 1; k++) pts.push({ x: pts[k].x + s[k] * d[k].x, y: pts[k].y + s[k] * d[k].y });
  return pts;
}

function createCustomShape() {
  var sides = customSidesValue();
  var size = clamp(parseInt(document.getElementById("customSize").value, 10) || 78, 40, 120);
  var regular = document.getElementById("customRegular").checked;
  var pts;
  if (regular) {
    pts = regularPolygonPoints(sides, size, -90);
  } else {
    var angles = currentAngles();
    var target = angleSum(sides);
    var sum = angles.reduce(function (a, b) { return a + b; }, 0);
    if (angles.some(function (a) { return a < 1 || a > 179; })) {
      flashBanner("每个角都要在 1° 到 179° 之间。"); return;
    }
    if (Math.abs(sum - target) > 0.5) {
      flashBanner("内角和要等于 " + target + "°（当前 " + Math.round(sum) + "°）。"); return;
    }
    pts = polygonFromAngles(angles, size);
    if (!pts) { flashBanner("这些角度无法围成图形，请调整后再试。"); return; }
  }
  pushUndo();
  addPolygon(pts);
}

/* ---------------------- World-coordinate geometry helpers ------------------ */
// All leaf ColoredPolygons within an object (handles groups).
function getLeafPolys(obj) {
  if (!obj) return [];
  if (obj.type === "coloredPolygon") return [obj];
  if (obj._objects) {
    var out = [];
    obj._objects.forEach(function (o) { out = out.concat(getLeafPolys(o)); });
    return out;
  }
  return [];
}

// World coordinate of a leaf polygon's vertex i (handles group nesting).
function worldVertex(poly, i) {
  var m = poly.calcTransformMatrix();
  var lp = { x: poly.points[i].x - poly.pathOffset.x, y: poly.points[i].y - poly.pathOffset.y };
  return transformPoint(lp, m);
}

// World edges of a leaf polygon: [{a,b,poly,ia,ib}]
function worldEdges(poly) {
  var n = poly.points.length, edges = [];
  var verts = [];
  for (var i = 0; i < n; i++) verts.push(worldVertex(poly, i));
  for (var e = 0; e < n; e++) {
    edges.push({ a: verts[e], b: verts[(e+1)%n], poly: poly, ia: e, ib: (e+1)%n });
  }
  return edges;
}

function collectWorldEdges(objs) {
  var edges = [];
  objs.forEach(function (o) {
    getLeafPolys(o).forEach(function (p) {
      edges = edges.concat(worldEdges(p));
    });
  });
  return edges;
}

/* ------------------------------ Snap engine -------------------------------- */
var guideObjs = [];
var pendingSnap = null;

function clearGuides() {
  if (!guideObjs.length) return;
  guideObjs.forEach(function (g) { canvas.remove(g); });
  guideObjs = [];
}

// Find best snap candidate between the active object and everything else.
function findSnap(active) {
  var dragEdges = collectWorldEdges([active]);
  var others = canvas.getObjects().filter(function (o) { return o !== active && !o.isGuide; });
  var targetEdges = collectWorldEdges(others);
  if (!dragEdges.length || !targetEdges.length) return null;

  var best = null;
  for (var i = 0; i < dragEdges.length; i++) {
    var de = dragEdges[i];
    var curDir = Math.atan2(de.b.y - de.a.y, de.b.x - de.a.x);
    for (var j = 0; j < targetEdges.length; j++) {
      var te = targetEdges[j];
      // two correspondences: reversed (natural shared-edge) and direct
      var corr = [
        { t1: te.b, t2: te.a },   // reversed: de.a->te.b, de.b->te.a
        { t1: te.a, t2: te.b }    // direct
      ];
      for (var k = 0; k < corr.length; k++) {
        var t1 = corr[k].t1, t2 = corr[k].t2;
        var desiredDir = Math.atan2(t2.y - t1.y, t2.x - t1.x);
        var dtheta = normAngle(desiredDir - curDir);
        if (Math.abs(dtheta) > SNAP_ANGLE) continue;
        var d1 = dist(de.a, t1), d2 = dist(de.b, t2);
        if (Math.min(d1, d2) > SNAP_DIST) continue;
        var cost = d1 + d2;
        if (!best || cost < best.cost) {
          best = { de: de, te: te, t1: t1, t2: t2, dtheta: dtheta, cost: cost };
        }
      }
    }
  }
  return best;
}

function drawGuide(edge, color, dashed, width) {
  var line = new fabric.Line([edge.a.x, edge.a.y, edge.b.x, edge.b.y], {
    stroke: color,
    strokeWidth: width || 3,
    strokeDashArray: dashed ? [7, 5] : null,
    strokeLineCap: "round",
    selectable: false,
    evented: false,
    hoverCursor: "default",
    isGuide: true,
    excludeFromExport: true,
    objectCaching: false
  });
  canvas.add(line);
  if (dashed) guideObjs.push(line); // only persistent pre-snap guides need cleanup
  return line;
}

function flashSnap(edge) {
  var line = drawGuide(edge, "#16c060", false, 5);
  line.set({ shadow: new fabric.Shadow({ color: "rgba(22,192,96,0.9)", blur: 12 }) });
  canvas.requestRenderAll();
  line.animate("opacity", 0, {
    duration: 400,
    easing: fabric.util.ease.easeOutCubic,
    onChange: canvas.requestRenderAll.bind(canvas),
    onComplete: function () { canvas.remove(line); }
  });
}

function applySnap(active, snap) {
  // 1) rotate so the dragged edge becomes collinear with the target edge
  active.rotate(active.angle + DEG(snap.dtheta));
  active.setCoords();
  if (active.forEachObject) active.forEachObject(function (o) { o.setCoords(); });

  // 2) recompute the dragged source vertex world position, then translate
  //    so it lands exactly on the matching target vertex.
  var newA = worldVertex(snap.de.poly, snap.de.ia);
  var dx = snap.t1.x - newA.x;
  var dy = snap.t1.y - newA.y;
  active.set({ left: active.left + dx, top: active.top + dy });
  active.setCoords();
  if (active.forEachObject) active.forEachObject(function (o) { o.setCoords(); });

  canvas.requestRenderAll();
  // green flash along the now-shared edge (target edge world coords)
  flashSnap(snap.te);
}

canvas.on("object:moving", function (e) {
  var active = e.target;
  if (!active) return;
  movedThisDrag = true;
  clearGuides();
  pendingSnap = null;
  var snap = findSnap(active);
  if (snap) {
    pendingSnap = { active: active, snap: snap };
    drawGuide(snap.te, "#ffd400", true, 3); // yellow dashed pre-snap guide
  }
});

function commitPendingSnap() {
  clearGuides();
  if (pendingSnap && canvas.getActiveObject() === pendingSnap.active) {
    applySnap(pendingSnap.active, pendingSnap.snap);
  }
  pendingSnap = null;
  // finalise undo entry for this drag (move + snap = one step)
  if (movedThisDrag && preDragState) { undoStack.push(preDragState); capUndo(); }
  movedThisDrag = false;
  preDragState = null;
}

canvas.on("mouse:up", commitPendingSnap);

/* ----------------------------- Undo (history) ------------------------------ */
var undoStack = [];
var isRestoring = false;
var preDragState = null;     // serialized state captured at mouse:down
var movedThisDrag = false;
var MAX_UNDO = 60;

function serialize() { return canvas.toJSON(EXTRA_PROPS); }
function capUndo() { while (undoStack.length > MAX_UNDO) undoStack.shift(); }

// Capture the current state so the *next* action can be undone back to it.
function pushUndo() {
  if (isRestoring) return;
  undoStack.push(serialize());
  capUndo();
}

function undo() {
  if (!undoStack.length) return;
  var state = undoStack.pop();
  isRestoring = true;
  clearGuides();
  canvas.discardActiveObject();
  canvas.loadFromJSON(state, function () {
    canvas.getObjects().forEach(function (o) {
      getLeafPolys(o).forEach(function (p) { p.set("showAngles", anglesOn); p.dirty = true; });
    });
    canvas.requestRenderAll();
    updateCounter();
    isRestoring = false;
  });
}

// Record pre-drag state at mouse:down so a drag becomes one undo step.
canvas.on("mouse:down", function (e) {
  if (isRestoring) return;
  if (e.target) { preDragState = serialize(); movedThisDrag = false; }
});

/* ------------------------------- Angle toggle ------------------------------ */
var anglesOn = false;
function applyAnglesFlag() {
  canvas.getObjects().forEach(function (o) {
    getLeafPolys(o).forEach(function (p) { p.set("showAngles", anglesOn); p.dirty = true; });
    o.dirty = true; // force groups (which cache) to re-render
  });
  canvas.requestRenderAll();
}
document.getElementById("toggleAngles").addEventListener("change", function (ev) {
  anglesOn = ev.target.checked;
  applyAnglesFlag();
});

/* ------------------------ Duplicate / Group -------------------------------- */
// Ctrl+D: clone the selection in place (offset +25px) and select the copy.
function duplicateSelected() {
  var active = canvas.getActiveObject();
  if (!active) { flashBanner("请先选择一个图形再复制。"); return; }
  pushUndo();
  active.clone(function (cloned) {
    canvas.discardActiveObject();
    if (cloned.type === "activeSelection") {
      cloned.canvas = canvas;
      cloned.forEachObject(function (o) {
        o.set({ left: o.left + 25, top: o.top + 25 });
        canvas.add(o);
      });
      cloned.setCoords();
    } else {
      cloned.set({ left: active.left + 25, top: active.top + 25 });
      canvas.add(cloned);
    }
    canvas.setActiveObject(cloned);
    canvas.requestRenderAll();
    updateCounter();
  }, EXTRA_PROPS);
}

function ungroup(group) {
  var sel = group.toActiveSelection();
  canvas.requestRenderAll();
  return sel;
}

function groupOrUngroup() {
  var active = canvas.getActiveObject();
  if (!active) { flashBanner("请先选择图形（框选 2 个以上可打包）。"); return; }
  if (active.type === "activeSelection") {
    pushUndo();
    active.toGroup();
    canvas.requestRenderAll();
    updateCounter();
    flashBanner("已将多个图形打包为一个整体 —— 现在它会作为一个整体移动和吸附。");
  } else if (active.type === "group") {
    pushUndo();
    ungroup(active);
    updateCounter();
    flashBanner("已解组 —— 现在可以分别移动每个图形。");
  } else {
    flashBanner("请框选 2 个以上图形再打包。");
  }
}

function deleteSelected() {
  var active = canvas.getActiveObject();
  if (!active) return;
  pushUndo();
  if (active.type === "activeSelection") {
    active.forEachObject(function (o) { canvas.remove(o); });
  } else {
    canvas.remove(active);
  }
  canvas.discardActiveObject();
  canvas.requestRenderAll();
  updateCounter();
}

function clearCanvas() {
  clearGuides();
  if (canvas.getObjects().length) pushUndo();
  canvas.getObjects().slice().forEach(function (o) { canvas.remove(o); });
  canvas.discardActiveObject();
  canvas.requestRenderAll();
  updateCounter();
}

/* --------------------------- Export / Import (JSON) ------------------------ */
// Reuse the same serialization the undo system relies on (EXTRA_PROPS keeps the
// per-edge colors + angle flags), so an exported file round-trips losslessly.
function exportJSON() {
  var data = serialize();
  data.objects = (data.objects || []).filter(function (o) { return !o.isGuide; });
  if (!data.objects.length) { flashBanner("画布是空的，没有可导出的图形。"); return; }
  var payload = {
    app: "tessellation-magic-house",
    version: 1,
    savedAt: new Date().toISOString(),
    canvas: data
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  var stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
  a.href = url;
  a.download = "tessellation-" + stamp + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  flashBanner("已导出 " + data.objects.length + " 个图形到 JSON 文件。");
}

// Load shapes from a previously exported file, replacing the current canvas.
// Accepts either our wrapped payload ({ canvas: {...} }) or a raw Fabric JSON.
function importJSONFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    var parsed;
    try { parsed = JSON.parse(ev.target.result); }
    catch (err) { flashBanner("导入失败：文件不是有效的 JSON。"); return; }
    var canvasJSON = (parsed && parsed.canvas) ? parsed.canvas : parsed;
    if (!canvasJSON || !Array.isArray(canvasJSON.objects)) {
      flashBanner("导入失败：文件中找不到图形数据。"); return;
    }
    pushUndo();
    isRestoring = true;
    clearGuides();
    canvas.discardActiveObject();
    canvas.loadFromJSON(canvasJSON, function () {
      canvas.getObjects().forEach(function (o) {
        getLeafPolys(o).forEach(function (p) { p.set("showAngles", anglesOn); p.dirty = true; });
        o.dirty = true;
      });
      canvas.requestRenderAll();
      updateCounter();
      isRestoring = false;
      var n = canvas.getObjects().filter(function (o) { return !o.isGuide; }).length;
      flashBanner("已导入 " + n + " 个图形。");
      fitToView();
    });
  };
  reader.onerror = function () { flashBanner("导入失败：无法读取文件。"); };
  reader.readAsText(file);
}

/* --------------- One-click tessellation demo (selected shape) -------------- */
// Rotate point p by ang (radians) around pivot o.
function rotateAround(p, o, ang) {
  var c = Math.cos(ang), s = Math.sin(ang);
  var dx = p.x - o.x, dy = p.y - o.y;
  return { x: o.x + dx*c - dy*s, y: o.y + dx*s + dy*c };
}

// Plan a tiling by repeated 180° rotations about shared-edge midpoints (valid
// for any triangle, any quadrilateral, and centrally-symmetric polygons such as
// the regular hexagon). Returns the target placements (excluding the base):
// each is the world center the copy must reach plus its net rotation (degrees).
function planHalfTurn(worldPts, baseCenter) {
  var MAX_TILES = 12;
  function centroidKey(pts) {
    var cx = 0, cy = 0;
    for (var i = 0; i < pts.length; i++) { cx += pts[i].x; cy += pts[i].y; }
    cx /= pts.length; cy /= pts.length;
    return Math.round(cx/2) + "_" + Math.round(cy/2);
  }
  var placed = {};
  placed[centroidKey(worldPts)] = true;
  var queue = [{ pts: worldPts, center: { x: baseCenter.x, y: baseCenter.y }, dphi: 0 }];
  var all = [];
  while (queue.length && all.length < MAX_TILES) {
    var t = queue.shift();
    all.push(t);
    for (var e = 0; e < t.pts.length; e++) {
      var a = t.pts[e], b = t.pts[(e+1) % t.pts.length];
      var mx = (a.x + b.x)/2, my = (a.y + b.y)/2;
      var nb = t.pts.map(function (p) { return { x: 2*mx - p.x, y: 2*my - p.y }; });
      var k = centroidKey(nb);
      if (!placed[k]) {
        placed[k] = true;
        queue.push({ pts: nb, center: { x: 2*mx - t.center.x, y: 2*my - t.center.y }, dphi: t.dphi + 180 });
      }
    }
  }
  flashBanner("用选中的图形密铺：复制并旋转，让相同的边彼此贴合，铺满平面！");
  return all.slice(1).map(function (t, i) { return { center: t.center, dphi: t.dphi, fill: i + 1 }; });
}

// Plan a fan of copies around one vertex. For shapes whose interior angle
// doesn't divide 360° (e.g. the regular pentagon) this leaves a visible gap,
// showing why such shapes can't tessellate.
function planRosette(worldPts, baseCenter) {
  var n = worldPts.length;
  var prev = worldPts[n-1], cur = worldPts[0], nxt = worldPts[1];
  var a1 = Math.atan2(prev.y - cur.y, prev.x - cur.x);
  var a2 = Math.atan2(nxt.y - cur.y, nxt.x - cur.x);
  var theta = Math.abs(normAngle(a1 - a2));        // interior angle (radians)
  var sign = normAngle(a1 - a2) >= 0 ? 1 : -1;     // sweep direction
  var fit = Math.floor((2*Math.PI + 1e-6) / theta);
  var out = [];
  for (var k = 1; k < fit; k++) {
    var ang = sign * theta * k;
    out.push({ center: rotateAround(baseCenter, cur, ang), dphi: ang * 180 / Math.PI, fill: k });
  }
  var deg = Math.round(theta * 180 / Math.PI);
  if (fit * theta < 2*Math.PI - 1e-3) {
    flashBanner("内角约 " + deg + "°，绕一个顶点放 " + fit + " 个共 " + (fit*deg) +
                "°，无法铺满 360° —— 所以它不能密铺！");
  } else {
    flashBanner(fit + " 个图形绕一个顶点正好拼成 360°，可以密铺！");
  }
  return out;
}

// Animate the planned copies into place one after another: each clone spawns on
// top of the base shape, then slides + rotates to its target over ~900ms.
// Copies are fully sequential: each one lands, then pauses before the next
// begins (STAGGER = DUR + PAUSE), so students can follow it step by step.
var demoRunning = false;
function animateTiles(base, baseCenter, baseAngle, tiles) {
  if (!tiles.length) { demoRunning = false; return; }
  var DUR = 900, PAUSE = 450, STAGGER = DUR + PAUSE;
  var done = 0;
  tiles.forEach(function (tile, i) {
    setTimeout(function () {
      base.clone(function (c) {
        c.set({
          fill: FILL_COLORS[tile.fill % FILL_COLORS.length],
          showAngles: anglesOn,
          selectable: true,
          evented: true
        });
        c.setPositionByOrigin(new fabric.Point(baseCenter.x, baseCenter.y), "center", "center");
        c.rotate(baseAngle);
        c.setCoords();
        canvas.add(c);
        fabric.util.animate({
          startValue: 0, endValue: 1, duration: DUR,
          easing: fabric.util.ease.easeOutCubic,
          onChange: function (v) {
            var cx = baseCenter.x + (tile.center.x - baseCenter.x) * v;
            var cy = baseCenter.y + (tile.center.y - baseCenter.y) * v;
            c.setPositionByOrigin(new fabric.Point(cx, cy), "center", "center");
            c.rotate(baseAngle + tile.dphi * v);
            c.setCoords();
            canvas.requestRenderAll();
          },
          onComplete: function () {
            c.setPositionByOrigin(new fabric.Point(tile.center.x, tile.center.y), "center", "center");
            c.rotate(baseAngle + tile.dphi);
            c.setCoords();
            canvas.requestRenderAll();
            updateCounter();
            if (++done === tiles.length) demoRunning = false;
          }
        });
      }, EXTRA_PROPS);
    }, i * STAGGER);
  });
}

function tessellationDemo() {
  if (demoRunning) return;
  var active = canvas.getActiveObject();
  if (!active || active.type !== "coloredPolygon") {
    flashBanner("请先选中单个图形，再点击「一键密铺演示」。");
    return;
  }
  pushUndo();
  demoRunning = true;
  var worldPts = [];
  for (var i = 0; i < active.points.length; i++) worldPts.push(worldVertex(active, i));
  var baseCenter = active.getCenterPoint();
  var baseAngle = active.angle || 0;
  // A regular polygon tessellates iff its interior angle divides 360° evenly
  // (triangle, square, hexagon). Half-turn tiling covers those plus any
  // triangle/quad; otherwise fall back to the rosette gap demo.
  var tiles = (worldPts.length === 5)
    ? planRosette(worldPts, baseCenter)
    : planHalfTurn(worldPts, baseCenter);
  canvas.discardActiveObject();
  canvas.requestRenderAll();
  animateTiles(active, baseCenter, baseAngle, tiles);
}

/* -------------------------------- Banner ----------------------------------- */
var bannerDefault = "添加图形后，拖动一个靠近另一个 —— 出现黄色虚线表示即将吸附，松开即锁定（绿色闪光）。让相同颜色的边对齐！";
var bannerTimer = null;
function flashBanner(msg) {
  var el = document.getElementById("bannerText");
  el.textContent = msg;
  if (bannerTimer) clearTimeout(bannerTimer);
  bannerTimer = setTimeout(function () { el.textContent = bannerDefault; }, 4200);
}

/* ------------------------------ Wire up UI --------------------------------- */
document.querySelectorAll("button.tool[data-add]").forEach(function (btn) {
  btn.addEventListener("click", function () { addShape(btn.getAttribute("data-add")); });
});
document.getElementById("btnDuplicate").addEventListener("click", duplicateSelected);
document.getElementById("btnUndo").addEventListener("click", undo);
document.getElementById("btnGroup").addEventListener("click", groupOrUngroup);
document.getElementById("btnTessDemo").addEventListener("click", tessellationDemo);
document.getElementById("btnDelete").addEventListener("click", deleteSelected);
document.getElementById("btnClear").addEventListener("click", clearCanvas);

// export / import shapes (JSON)
document.getElementById("btnExport").addEventListener("click", exportJSON);
document.getElementById("btnImport").addEventListener("click", function () {
  var input = document.getElementById("importFile");
  input.value = ""; // reset so re-selecting the same file still fires change
  input.click();
});
document.getElementById("importFile").addEventListener("change", function (e) {
  importJSONFile(e.target.files && e.target.files[0]);
});

// custom shape builder
document.getElementById("sidesUp").addEventListener("click", function () {
  document.getElementById("customSides").value = clamp(customSidesValue() + 1, 3, 12);
  refreshCustomFields();
});
document.getElementById("sidesDown").addEventListener("click", function () {
  document.getElementById("customSides").value = clamp(customSidesValue() - 1, 3, 12);
  refreshCustomFields();
});
document.getElementById("customRegular").addEventListener("change", refreshCustomFields);
document.getElementById("btnCreateCustom").addEventListener("click", createCustomShape);
refreshCustomFields();

// canvas view controls (move / scale / overview)
document.getElementById("vcPan").addEventListener("click", function () { setPanMode(!handMode); });
document.getElementById("vcZoomIn").addEventListener("click", function () { zoomBy(1.2); });
document.getElementById("vcZoomOut").addEventListener("click", function () { zoomBy(1 / 1.2); });
document.getElementById("vcZoomLabel").addEventListener("click", resetView);
document.getElementById("vcFit").addEventListener("click", fitToView);
updateZoomLabel();

// keyboard shortcuts
window.addEventListener("keydown", function (e) {
  var tag = (e.target && e.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA") return;
  var ctrl = e.ctrlKey || e.metaKey;
  var k = e.key.toLowerCase();
  if (e.code === "Space" || e.key === " ") {
    e.preventDefault();
    if (!spaceDown) { spaceDown = true; refreshPanState(); }
  }
  else if (ctrl && k === "d") { e.preventDefault(); duplicateSelected(); }
  else if (ctrl && k === "z") { e.preventDefault(); undo(); }
  else if (ctrl && k === "g") { e.preventDefault(); groupOrUngroup(); }
  else if (e.key === "Delete" || e.key === "Backspace") { e.preventDefault(); deleteSelected(); }
  else if (k === "h") { e.preventDefault(); setPanMode(!handMode); }
  else if (k === "0") { e.preventDefault(); fitToView(); }
  else if (k === "+" || k === "=") { e.preventDefault(); zoomBy(1.2); }
  else if (k === "-" || k === "_") { e.preventDefault(); zoomBy(1 / 1.2); }
});

window.addEventListener("keyup", function (e) {
  if (e.code === "Space" || e.key === " ") {
    spaceDown = false;
    if (!isPanning) refreshPanState();
  }
});

canvas.on("object:added", updateCounter);
canvas.on("object:removed", updateCounter);

// start empty: only the shape-creation tools are shown until a shape exists
updateCounter();
</script>
</body>
